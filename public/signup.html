<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pingme — design registration credential profile</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-6 selection:bg-indigo-500 selection:text-white">

    <div class="bg-zinc-900/30 border border-zinc-900 p-8 rounded-2xl shadow-2xl backdrop-blur-md max-w-sm w-full transition-all duration-300">
        
        <div class="mb-8">
            <a href="/" class="text-lg font-bold tracking-tight text-white flex items-center gap-2 mb-6">
                <span class="h-2 w-2 rounded-full bg-indigo-500"></span>
                pingme
            </a>
            <h2 id="formTitle" class="text-xl font-normal text-white tracking-tight">Create your key.</h2>
            <p id="formSubtitle" class="text-xs text-zinc-500 mt-1 font-light">Input processing structural parameters to begin.</p>
        </div>

        <div id="alertBox" class="hidden text-xs p-3.5 mb-5 rounded-xl border font-light"></div>

        <form id="infoForm" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase font-medium tracking-wider text-zinc-500 mb-1.5">Full Name</label>
                <input type="text" id="name" required class="w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-xs text-zinc-200 font-light placeholder-zinc-700" placeholder="e.g., Alex Vance">
            </div>
            <div>
                <label class="block text-[10px] uppercase font-medium tracking-wider text-zinc-500 mb-1.5">Email Destination</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-xs text-zinc-200 font-light placeholder-zinc-700" placeholder="name@domain.com">
            </div>
            <div>
                <label class="block text-[10px] uppercase font-medium tracking-wider text-zinc-500 mb-1.5">Secret Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-zinc-950 border border-zinc-900 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-xs text-zinc-200 font-light placeholder-zinc-700" placeholder="••••••••">
            </div>

            <button type="submit" id="btnSendOtp" class="w-full py-3.5 px-4 bg-white text-zinc-950 hover:bg-zinc-200 font-semibold rounded-xl text-xs tracking-wider uppercase transition-colors mt-6">
                Receive OTP Code
            </button>
        </form>

        <form id="otpForm" class="space-y-4 hidden animate-fadeIn">
            <div>
                <label class="block text-[10px] uppercase font-medium tracking-wider text-zinc-500 mb-1.5">Enter 6-Digit OTP Key Token</label>
                <input type="text" id="otp" maxlength="6" required class="w-full text-center tracking-[0.5em] font-mono px-4 py-3.5 bg-zinc-950 border border-zinc-900 rounded-xl focus:outline-none focus:border-indigo-500 transition-colors text-base text-white placeholder-zinc-800" placeholder="000000">
            </div>

            <button type="submit" id="btnVerifyOtp" class="w-full py-3.5 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl text-xs tracking-wider uppercase transition-colors mt-6">
                Verify & Register Account
            </button>
            
            <button type="button" onclick="window.location.reload()" class="w-full text-center text-[10px] text-zinc-500 hover:text-zinc-300 font-mono uppercase tracking-wider block mt-2">
                ← Edit Information
            </button>
        </form>

        <p id="footerRedirect" class="text-center text-xs text-zinc-500 mt-6 font-light">
            Already stored details? <a href="/login" class="text-zinc-300 hover:underline">Log in</a>
        </p>
    </div>

    <script>
        const infoForm = document.getElementById('infoForm');
        const otpForm = document.getElementById('otpForm');
        const alertBox = document.getElementById('alertBox');
        
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const footerRedirect = document.getElementById('footerRedirect');

        const btnSendOtp = document.getElementById('btnSendOtp');
        const btnVerifyOtp = document.getElementById('btnVerifyOtp');

        function displayAlert(msg, isSuccess = false) {
            alertBox.textContent = msg;
            alertBox.className = `text-xs p-3.5 mb-5 rounded-xl border font-light ${
                isSuccess ? 'bg-emerald-950/30 border-emerald-900/50 text-emerald-400' : 'bg-red-950/30 border-red-900/50 text-red-400'
            }`;
        }

        // Action 1: Handle Information Submission & OTP Transmission request
        infoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnSendOtp.disabled = true;
            btnSendOtp.textContent = "Processing payload...";

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/auth/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    displayAlert(data.error || "An integration exception occurred.");
                    btnSendOtp.disabled = false;
                    btnSendOtp.textContent = "Receive OTP Code";
                } else {
                    // Interface layout swap procedures to secondary stage setup
                    infoForm.classList.add('hidden');
                    otpForm.classList.remove('hidden');
                    footerRedirect.classList.add('hidden');
                    
                    formTitle.textContent = "Security clearance.";
                    formSubtitle.textContent = `A verification code was transmitted to ${payload.email}`;
                    displayAlert(data.message, true);
                }
            } catch (err) {
                displayAlert("Network routing interface loss.");
                btnSendOtp.disabled = false;
                btnSendOtp.textContent = "Receive OTP Code";
            }
        });

        // Action 2: Handle Final Token Verification & Account Insertion
        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            btnVerifyOtp.disabled = true;
            btnVerifyOtp.textContent = "Validating cryptographic token...";

            const otpValue = document.getElementById('otp').value;

            try {
                const response = await fetch('/api/auth/verify-and-register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp: otpValue })
                });

                const data = await response.json();

                if (!response.ok) {
                    displayAlert(data.error || "Verification failure.");
                    btnVerifyOtp.disabled = false;
                    btnVerifyOtp.textContent = "Verify & Register Account";
                } else {
                    displayAlert(data.message + " Redirecting profile...", true);
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                }
            } catch (err) {
                displayAlert("Processing endpoint communication breakdown.");
                btnVerifyOtp.disabled = false;
                btnVerifyOtp.textContent = "Verify & Register Account";
            }
        });
    </script>
</body>
</html>
